{% extends "base.html" %}
{% block title %}Anmelden – Gantt-Diagramm Editor{% endblock %}
{% block content %}
<div class="card" style="max-width:380px;margin:0 auto">
  <h1>Anmelden</h1>
  <p class="hint">Bitte melden Sie sich an, um das Diagramm zu öffnen.</p>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field">
      <label for="username">Benutzername</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label for="password">Passwort</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" style="width:100%">Anmelden</button>
  </form>
</div>
{% endblock %}
