services:
  gantt:
    build: .
    # Alternativ ein vorgebautes Image verwenden:
    # image: gantt-editor:latest
    container_name: gantt-editor
    restart: unless-stopped
    ports:
      # Host-Port : Container-Port
      - "8000:8000"
    environment:
      GANTT_DB: /data/gantt.db
      GANTT_PORT: "8000"
      GANTT_ADMIN_USER: admin
      GANTT_ADMIN_PASSWORD: "adminpassword"
      GANTT_COOKIE_SECURE: "1"
    volumes:
      - gantt-data:/data

volumes:
  gantt-data:
