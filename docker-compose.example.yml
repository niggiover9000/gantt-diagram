services:
  gantt:
    build: .
    container_name: niggiover9000/gantt-editor:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GANTT_DB: /data/gantt.db
      GANTT_PORT: "8000"
      GANTT_ADMIN_USER: admin
      GANTT_ADMIN_PASSWORD: "adminpassword"
      GANTT_COOKIE_SECURE: "1"
    volumes:
      - ./gantt-data:/data

volumes:
  gantt-data:
